<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#050810"/>
  <title>HuquqBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;background:#050810;color:#fff}
    body{overflow:hidden}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:99px}
    .fi{animation:fi .45s ease both}
    .su{animation:su .3s ease both}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
    @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    textarea:focus,input:focus{outline:none}
    .gb{border:1px solid rgba(212,168,58,.2)}
    .spin{animation:spin 1s linear infinite}
    .flt{animation:flt 3s ease-in-out infinite}
    .cw,.hw{display:flex;flex-direction:column;height:100vh;height:100dvh}
    .hw{overflow:hidden}
    .safe-input{padding-bottom:max(10px,env(safe-area-inset-bottom))!important}
    textarea,input{color:#fff!important}
    ::placeholder{color:#475569!important}
    .hscroll::-webkit-scrollbar{display:none}
    .hscroll{scrollbar-width:none}
  </style>
</head>
<body><div id="root"></div>

const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:(k)=>{try{localStorage.removeItem(k)}catch{}},
};

// ── Icons ─────────────────────────────────────────────────────────────────────
const I = {

  send:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,

  tDn:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg>,

const B = (extra={}) => ({background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',...extra});
const F = (color,extra={}) => ({fontFamily:'DM Sans,sans-serif',color,...extra});

// ── Splash ────────────────────────────────────────────────────────────────────
function Splash({onDone}){
  useEffect(()=>{setTimeout(onDone,2000);},[]);
  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#050810',position:'relative',overflow:'hidden'}} className="fi">
      <div style={{position:'absolute',top:'20%',left:'50%',transform:'translateX(-50%)',width:280,height:280,background:'radial-gradient(circle,rgba(212,168,58,.1) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div className="flt" style={{marginBottom:20}}>
        <div style={{width:80,height:80,borderRadius:24,background:'linear-gradient(135deg,#162035,#1e2d4a)',border:'1px solid rgba(212,168,58,.35)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 20px 50px rgba(212,168,58,.12)'}}>
          <svg width="44" height="44" viewBox="0 0 52 52" fill="none">
            <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2" fill="rgba(212,168,58,.08)" strokeLinejoin="round"/>
            <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </div>
      <h1 style={{fontFamily:'Crimson Pro,serif',fontSize:38,color:'#fff',marginBottom:6}}>HuquqBot</h1>
      <p style={{fontSize:13,...F('#64748b')}}>Yuridik AI yordamchi</p>
      <div style={{display:'flex',gap:8,marginTop:32}}>
        {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#d4a83a',animation:`pulse 1.2s ${i*.2}s infinite ease-in-out`}}/>)}
      </div>
      <p style={{position:'absolute',bottom:28,fontSize:11,...F('#334155')}}>lex.uz • 50,000+ qonun hujjati</p>
    </div>
  );
}

// ── Lang ─────────────────────────────────────────────────────────────────────
function LangSelect({onSelect}){
  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#050810',padding:'0 24px'}} className="fi">
      <div style={{width:60,height:60,borderRadius:18,background:'linear-gradient(135deg,#162035,#1e2d4a)',border:'1px solid rgba(212,168,58,.3)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:18}}>
        <svg width="32" height="32" viewBox="0 0 52 52" fill="none">
          <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2" fill="rgba(212,168,58,.08)" strokeLinejoin="round"/>
          <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <h1 style={{fontFamily:'Crimson Pro,serif',fontSize:30,color:'#fff',marginBottom:4}}>HuquqBot</h1>
      <p style={{fontSize:13,...F('#64748b'),marginBottom:32}}>Tilni tanlang / Выберите язык</p>
      <div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',gap:10}}>
        {[{l:'uz',f:'🇺🇿',n:"O'zbek tili",s:'Davom etish uchun tanlang'},{l:'ru',f:'🇷🇺',n:'Русский язык',s:'Выберите для продолжения'}].map(({l,f,n,s})=>(
          <button key={l} onClick={()=>onSelect(l)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,background:'#101829',border:'1px solid rgba(212,168,58,.2)',cursor:'pointer',width:'100%'}}>
            <span style={{fontSize:26}}>{f}</span>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:14,fontWeight:600,...F('#fff')}}>{n}</div>
              <div style={{fontSize:11,...F('#64748b')}}>{s}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Home ──────────────────────────────────────────────────────────────────────
function Home({lang,setLang,onChat,onOpenChat,chats,onDeleteChat,lawCount,topQ}){
  const t=T[lang];
  const [query,setQuery]=useState('');
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [showLang,setShowLang]=useState(false);
  const [showAll,setShowAll]=useState(false);
  const recentSearches=S.get('hb_rs',[]);
  const timer=useRef(null);
  const tg=window.Telegram?.WebApp;
  const openUrl=url=>{if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank');};

  useEffect(()=>{
    clearTimeout(timer.current);
    if(query.trim().length<2){setResults([]);setSearching(false);return;}
    setSearching(true);
    timer.current=setTimeout(async()=>{
      try{const r=await fetch(`${API}/api/search?q=${encodeURIComponent(query)}&lang=${lang}`);
        if(r.ok){const d=await r.json();setResults(d.results||[]);}}catch{}
      setSearching(false);
    },400);
  },[query]);

  const startQ=q=>{
    const rs=S.get('hb_rs',[]);
    S.set('hb_rs',[q,...rs.filter(x=>x!==q)].slice(0,5));
    onChat(q);
  };

  // Quick questions: top asked OR defaults
  const qTitles = topQ.length>=6 ? topQ.slice(0,6).map(q=>q.slice(0,20)+(q.length>20?'...':'')) : t.quickTitles;
  const qQ2 = topQ.length>=6 ? topQ.slice(0,6) : t.quickQ2;
  const displayChats = showAll ? chats : chats.slice(0,3);

  return (
    <div className="hw" style={{background:'#050810'}}>
      {/* Header */}
      <div style={{flexShrink:0,padding:'14px 14px 10px',background:'linear-gradient(180deg,#050810 60%,transparent 100%)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:11,background:'linear-gradient(135deg,#162035,#1e2d4a)',border:'1px solid rgba(212,168,58,.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="20" height="20" viewBox="0 0 52 52" fill="none">
                <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2.5" fill="rgba(212,168,58,.1)" strokeLinejoin="round"/>
                <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <span style={{fontFamily:'Crimson Pro,serif',fontSize:22,color:'#fff'}}>{t.appName}</span>
          </div>
          <button onClick={()=>setShowLang(true)} style={{...B({width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.2)',fontSize:18})}}>
            {lang==='uz'?'🇺🇿':'🇷🇺'}
          </button>
        </div>
        {lawCount>0&&(
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',animation:'pulse 2s infinite'}}/>
            <span style={{fontSize:11,...F('#64748b')}}>{lawCount.toLocaleString()} {t.lawCount} • {t.source}</span>
          </div>
        )}
      </div>

      {/* Scroll area */}
      <div style={{flex:1,overflowY:'auto',padding:'0 14px',paddingBottom:'max(110px,calc(90px + env(safe-area-inset-bottom)))',scrollbarWidth:'none'}}>
        {/* Search */}
        <div style={{position:'relative',marginBottom:14}}>
          <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',width:17,height:17,color:'#475569',pointerEvents:'none'}}>{I.search}</span>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={t.search}
            style={{width:'100%',paddingLeft:42,paddingRight:16,paddingTop:13,paddingBottom:13,borderRadius:16,background:'#101829',border:'1px solid rgba(212,168,58,.2)',fontSize:14,transition:'border-color .2s'}}
          />
          {searching&&<div style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',width:16,height:16,border:'2px solid #d4a83a',borderTopColor:'transparent',borderRadius:'50%'}} className="spin"/>}
        </div>

        {/* Recent searches */}
        {!query&&recentSearches.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,...F('#64748b'),textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:7}}>{t.recentSearch}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {recentSearches.map((rs,i)=>(
                <button key={i} onClick={()=>startQ(rs)} style={{...B({gap:5,padding:'5px 10px',borderRadius:20,background:'#101829',border:'1px solid rgba(212,168,58,.15)'})}}>
                  <span style={{width:11,height:11,color:'#475569'}}>{I.clock}</span>
                  <span style={{fontSize:11,...F('#94a3b8')}}>{rs.slice(0,30)}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Search results */}
        {query.trim().length>=2&&(
          <div style={{marginBottom:14}} className="su">
            {results.length===0&&!searching?(
              <div style={{textAlign:'center',padding:'24px 0',fontSize:13,...F('#475569')}}>{t.noResult}</div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {results.map((r,i)=>(
                  <button key={i} onClick={()=>startQ(r.title)} style={{textAlign:'left',padding:'11px 13px',borderRadius:13,background:'#101829',border:'1px solid rgba(212,168,58,.15)',cursor:'pointer',animationDelay:`${i*.04}s`}} className="su">
                    <div style={{fontSize:13,fontWeight:500,...F('#fff'),marginBottom:3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{r.title}</div>
                    <div style={{display:'flex',gap:7}}>
                      <span style={{fontSize:11,...F('#d4a83a')}}>{r.number||'lex.uz'}</span>
                      {r.date&&<span style={{fontSize:11,...F('#475569')}}>• {r.date.slice(0,4)}</span>}
                    </div>
                  </button>
                ))}
                {results.length>0&&(
                  <button onClick={()=>startQ(query)} style={{padding:'11px',borderRadius:13,background:'rgba(212,168,58,.07)',border:'1px solid rgba(212,168,58,.22)',fontSize:13,fontWeight:500,...F('#f0c060'),cursor:'pointer'}}>
                    🤖 AI: "{query}"
                  </button>
                )}
              </div>
            )}
          </div>
        )}

        {!query&&(
          <>
            {/* Quick questions - horizontal scroll, card style different from chat */}
            <div style={{fontSize:10,...F('#94a3b8'),textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:10}}>{t.quickQ}</div>
            <div className="hscroll" style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:4,marginBottom:18}}>

                        <span style={{width:15,height:15}}>{I.chat}</span>

        <span style={{width:22,height:22,color:'#fff'}}>{I.chat}</span>

            <p style={{fontFamily:'Crimson Pro,serif',fontSize:18,color:'#fff',marginBottom:14}}>{t.changeLang}</p>

}

// ── Chat ──────────────────────────────────────────────────────────────────────
function Chat({lang,chatId,initialQ,onBack,onSave}){
  const t=T[lang];
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [steps,setSteps]=useState([]);
  const [uploading,setUploading]=useState(false);
  const bottomRef=useRef();
  const inputRef=useRef();
  const fileRef=useRef();
  const tg=window.Telegram?.WebApp;

  useEffect(()=>{
    const saved=S.get(`chat_${chatId}`,null);
    if(saved?.messages?.length>0){setMessages(saved.messages);}
    else if(initialQ){sendMsg(initialQ);}
  },[chatId]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages,steps,uploading]);

  const saveChat=(msgs,firstQ)=>{
    const title=firstQ?.slice(0,50)||msgs[0]?.content?.slice(0,50)||'Chat';
    const data={id:chatId,title,messages:msgs,updatedAt:Date.now()};
    S.set(`chat_${chatId}`,data);onSave(data);
  };

  const sendMsg=async text=>{
    if(!text?.trim()||busy)return;
    const q=text.trim();
    setInput('');
    if(inputRef.current)inputRef.current.style.height='auto';
    setBusy(true);
    const nm=[...messages,{role:'user',content:q,ts:Date.now()}];
    setMessages(nm);
    setSteps([t.analyzing,t.searching,t.aiThinking].map((s,i)=>({text:s,state:i===0?'active':'pending'})));
    await sleep(500);
    setSteps(s=>s.map((x,i)=>i===0?{...x,state:'done'}:i===1?{...x,state:'active'}:x));
    try{
      const r=await fetch(`${API}/api/ask`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:q,lang,history:messages.slice(-8).map(m=>({role:m.role,content:m.role==='user'?m.content:m.content?.simpleAnswer||''}))}),
      });
      const d=await r.json();
      setSteps(s=>s.map((x,i)=>i<=1?{...x,state:'done'}:{...x,state:'active'}));
      await sleep(350);setSteps([]);
      const ans={role:'assistant',content:d.answer,sources:d.sources,id:`msg_${Date.now()}`,ts:Date.now()};
      const all=[...nm,ans];
      setMessages(all);saveChat(all,q);
      if(tg?.HapticFeedback)tg.HapticFeedback.impactOccurred('light');
    }catch{
      setSteps([]);
      setMessages(m=>[...m,{role:'assistant',content:null,error:t.err,ts:Date.now()}]);
    }
    setBusy(false);
  };

  const handleFile=async file=>{
    if(!file||busy)return;
    setUploading(true);
    // Show file bubble in chat
    const fileName=file.name;
    const fileMsgId=`file_${Date.now()}`;
    const fileMsg={role:'user',content:null,fileMsg:true,fileName,ts:Date.now(),id:fileMsgId};
    const nm=[...messages,fileMsg];
    setMessages(nm);
    setBusy(true);
    setSteps([t.analyzingDoc,''].map((s,i)=>({text:s,state:i===0?'active':'pending'})));
    try{
      const fd=new FormData();fd.append('file',file);fd.append('lang',lang);
      const r=await fetch(`${API}/api/upload`,{method:'POST',body:fd});
      const d=await r.json();
      setSteps([]);
      if(d.answer){
        const ans={role:'assistant',content:d.answer,sources:d.sources||[],id:`msg_${Date.now()}`,ts:Date.now()};
        const all=[...nm,ans];
        setMessages(all);saveChat(all,fileName);
        // If more parts, show as follow-up questions automatically
        if(d.follow_up_questions?.length>0){
          // Continue analyzing remaining parts
          for(const fq of d.follow_up_questions){
            await sleep(800);
            setSteps([{text:t.analyzingDoc,state:'active'}]);
            const r2=await fetch(`${API}/api/ask`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:fq,lang,is_doc:true,history:[]})});
            const d2=await r2.json();
            setSteps([]);
            if(d2.answer){
              const ans2={role:'assistant',content:d2.answer,sources:d2.sources||[],id:`msg_${Date.now()}`,ts:Date.now()};
              setMessages(m=>[...m,ans2]);
            }
          }
        }
      }else{
        setMessages(m=>[...m,{role:'assistant',content:null,error:d.error||t.err,ts:Date.now()}]);
      }
    }catch{
      setSteps([]);
      setMessages(m=>[...m,{role:'assistant',content:null,error:t.err,ts:Date.now()}]);
    }
    setUploading(false);setBusy(false);
  };

  const openUrl=url=>{if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank');};
  const sendFb=async(msgId,val)=>{
    try{await fetch(`${API}/api/feedback`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msgId,val,lang})});}catch{}
  };

  return (
    <div className="cw" style={{background:'#050810'}}>
      {/* Header */}
      <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderBottom:'1px solid rgba(212,168,58,.1)'}}>
        <button onClick={onBack} style={{...B({width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.2)',color:'#94a3b8'})}}>
          <span style={{width:20,height:20}}>{I.back}</span>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:500,...F('#fff')}}>{t.chatTitle}</div>
          <div style={{fontSize:10,...F('#475569')}}>LEX.UZ · MY.GOV.UZ · AI</div>
        </div>
        <button onClick={()=>{S.del(`chat_${chatId}`);onBack();}} style={{...B({width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.2)',color:'#475569'})}}>
          <span style={{width:15,height:15}}>{I.plus}</span>
        </button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'14px',display:'flex',flexDirection:'column',gap:10,scrollbarWidth:'none'}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}} className="su">
            {m.role==='user'?(
              m.fileMsg?(
                /* File bubble */
                <div style={{maxWidth:'75%',padding:'10px 13px',borderRadius:'16px 16px 4px 16px',background:'linear-gradient(135deg,#1e3a6e,#162d58)',border:'1px solid rgba(100,130,200,.2)',display:'flex',alignItems:'center',gap:9}}>
                  <div style={{width:34,height:34,borderRadius:9,background:'rgba(212,168,58,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{width:18,height:18,color:'#d4a83a'}}>{I.doc}</span>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:500,...F('#fff'),maxWidth:160,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{m.fileName}</div>
                    <div style={{fontSize:10,...F('#93c5fd')}}>{t.docUploaded}</div>
                  </div>
                </div>
              ):(
                <div style={{maxWidth:'80%',padding:'11px 14px',borderRadius:'17px 17px 4px 17px',background:'linear-gradient(135deg,#1e3a6e,#162d58)',border:'1px solid rgba(100,130,200,.2)',fontSize:14,...F('#fff'),lineHeight:1.55}}>
                  {m.content}
                </div>
              )
            ):m.error?(
              <div style={{maxWidth:'80%',padding:'11px 13px',borderRadius:'17px 17px 17px 4px',background:'#101829',border:'1px solid rgba(239,68,68,.2)',fontSize:13,...F('#f87171')}}>⚠️ {m.error}</div>
            ):(
              <AnsCard answer={m.content} sources={m.sources} lang={lang} openUrl={openUrl} t={t} msgId={m.id} onFb={sendFb}/>
            )}
          </div>
        ))}

        {/* Steps */}
        {steps.length>0&&(
          <div style={{display:'flex'}} className="su">
            <div style={{padding:'11px 13px',borderRadius:'17px 17px 17px 4px',background:'#101829',border:'1px solid rgba(212,168,58,.18)',minWidth:190}}>
              {steps.filter(s=>s.text).map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'4px 0'}}>
                  <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,background:s.state==='done'?'#22c55e':s.state==='active'?'#d4a83a':'#162035',animation:s.state==='active'?'pulse 1s infinite':undefined}}/>
                  <span style={{fontSize:12,...F(s.state==='done'?'#4ade80':s.state==='active'?'#fff':'#475569')}}>{s.text}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div className="safe-input" style={{flexShrink:0,padding:'8px 12px',borderTop:'1px solid rgba(212,168,58,.1)'}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,padding:'8px 10px',borderRadius:20,background:'#101829',border:'1px solid rgba(212,168,58,.2)'}}>
          {/* Attach */}
          <button onClick={()=>fileRef.current?.click()} disabled={busy}
            style={{...B({width:34,height:34,borderRadius:10,background:'rgba(212,168,58,.08)',color:'#d4a83a',flexShrink:0,opacity:busy?.5:1})}}>
            <span style={{width:17,height:17}}>{I.attach}</span>
          </button>
          <input ref={fileRef} type="file" accept=".pdf,.docx,.doc" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            placeholder={t.placeholder} rows={1}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(input);}}}
            onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,100)+'px';}}
            style={{flex:1,background:'transparent',border:'none',fontSize:14,...F('#fff'),lineHeight:1.5,resize:'none',maxHeight:100,minHeight:22}}
          />
          <button onClick={()=>sendMsg(input)} disabled={busy||!input.trim()}
            style={{...B({width:36,height:36,borderRadius:'50%',background:busy||!input.trim()?'#162035':'linear-gradient(135deg,#d4a83a,#b8902a)',flexShrink:0,opacity:busy||!input.trim()?.5:1,transition:'all .2s'})}}>
            <span style={{width:15,height:15,...F('#fff')}}>{I.send}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Answer Card ───────────────────────────────────────────────────────────────
function AnsCard({answer,sources,lang,openUrl,t,msgId,onFb}){
  const [fb,setFb]=useState(null);
  const [copied,setCopied]=useState(false);
  const [shared,setShared]=useState(false);
  if(!answer)return null;

  const cs=answer.confidence==='high'?{c:'#4ade80',b:'rgba(34,197,94,.1)',br:'rgba(34,197,94,.2)'}
    :answer.confidence==='medium'?{c:'#f0c060',b:'rgba(212,168,58,.1)',br:'rgba(212,168,58,.2)'}
    :{c:'#f87171',b:'rgba(239,68,68,.1)',br:'rgba(239,68,68,.2)'};
  const ct=answer.confidence==='high'?t.highConf:answer.confidence==='medium'?t.medConf:t.lowConf;

  const copy=()=>{
    const tx=`⚖️ ${answer.category}\n\n${answer.simpleAnswer||''}\n\n📌 ${answer.legalBasis||''}\n\n@yuridikAIbot`;
    navigator.clipboard?.writeText(tx).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };
  const share=()=>{
    const tx=`⚖️ HuquqBot:\n\n${answer.simpleAnswer||''}\n\n📌 ${answer.legalBasis||''}\n\nlex.uz`;
    if(navigator.share)navigator.share({text:tx}).catch(()=>{});
    else navigator.clipboard?.writeText(tx).then(()=>{setShared(true);setTimeout(()=>setShared(false),2000);});
  };
  const doFb=v=>{setFb(v);onFb?.(msgId,v);};

  return (
    <div style={{maxWidth:'92%',width:'92%'}}>
      <div style={{padding:'13px',borderRadius:'17px 17px 17px 4px',background:'#101829',border:'1px solid rgba(212,168,58,.18)'}}>
        {/* Top */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:18}}>{answer.icon||'⚖️'}</span>
            <span style={{fontSize:11,fontWeight:600,...F('#d4a83a'),textTransform:'uppercase',letterSpacing:'0.05em'}}>{answer.category}</span>
          </div>
          <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,color:cs.c,background:cs.b,border:`1px solid ${cs.br}`}}>{ct}</span>
        </div>

        {/* Legal basis */}
        {answer.legalBasis&&(
          <div style={{display:'flex',gap:7,marginBottom:9,padding:'7px 9px',borderRadius:9,background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.1)'}}>
            <span style={{fontSize:11,...F('#d4a83a'),flexShrink:0}}>📌</span>
            <span style={{fontSize:12,...F('#e2e8f0'),lineHeight:1.4}}>{answer.legalBasis}</span>
          </div>
        )}

        {/* Answer text */}
        <p style={{fontSize:14,...F('#e2e8f0'),lineHeight:1.65,marginBottom:(answer.steps||[]).length?9:0}} dangerouslySetInnerHTML={{__html:(answer.simpleAnswer||'').replace(/\n/g,'<br/>')}}/>

        {/* Steps */}
        {(answer.steps||[]).length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:9}}>
            {answer.steps.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9}}>
                <span style={{width:19,height:19,borderRadius:'50%',background:'rgba(212,168,58,.12)',fontSize:10,fontWeight:600,...F('#f0c060'),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>{i+1}</span>
                <span style={{fontSize:13,...F('#e2e8f0'),lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
        )}

        {/* Sources */}
        {(sources||[]).length>0&&(
          <div style={{borderTop:'1px solid rgba(212,168,58,.1)',paddingTop:9,marginTop:9}}>
            <div style={{fontSize:10,...F('#64748b'),textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:7}}>{t.officialSrc}</div>
            {sources.map((s,i)=>(
              <div key={i} style={{marginBottom:7}}>
                <button onClick={()=>openUrl(s.url)} style={{...B({justifyContent:'flex-start',gap:5,fontSize:12,...F('#d4a83a'),marginBottom:4,width:'100%',textAlign:'left'})}}>
                  <span style={{width:12,height:12,flexShrink:0}}>{I.link}</span>
                  <span style={{overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{s.title}</span>
                </button>
                <button onClick={()=>openUrl(s.url)} style={{...B({gap:5,fontSize:11,...F('#94a3b8'),background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.13)',borderRadius:8,padding:'4px 9px'})}}>
                  <span style={{width:10,height:10}}>{I.globe}</span>{t.readFull} →
                </button>
              </div>
            ))}
          </div>
        )}

        {/* Warning */}
        {answer.warning&&answer.warning!=='null'&&(
          <div style={{display:'flex',gap:7,marginTop:9,paddingTop:9,borderTop:'1px solid rgba(212,168,58,.1)'}}>
            <span style={{width:12,height:12,...F('#f0c060'),flexShrink:0,marginTop:2}}>{I.info}</span>
            <span style={{fontSize:12,...F('#f0c060'),lineHeight:1.5}}>{answer.warning}</span>
          </div>
        )}

        {/* Actions */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,paddingTop:9,borderTop:'1px solid rgba(212,168,58,.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:10,...F('#475569')}}>{t.feedbackQ}</span>
            <button onClick={()=>doFb('up')} style={{...B({width:27,height:27,borderRadius:8,background:fb==='up'?'rgba(34,197,94,.15)':'rgba(212,168,58,.05)',border:`1px solid ${fb==='up'?'rgba(34,197,94,.3)':'rgba(212,168,58,.1)'}`,transition:'all .2s'})}}>
              <span style={{width:12,height:12,...F(fb==='up'?'#4ade80':'#64748b')}}>{I.tUp}</span>
            </button>
            <button onClick={()=>doFb('down')} style={{...B({width:27,height:27,borderRadius:8,background:fb==='down'?'rgba(239,68,68,.15)':'rgba(212,168,58,.05)',border:`1px solid ${fb==='down'?'rgba(239,68,68,.3)':'rgba(212,168,58,.1)'}`,transition:'all .2s'})}}>
              <span style={{width:12,height:12,...F(fb==='down'?'#f87171':'#64748b')}}>{I.tDn}</span>
            </button>
          </div>
          <div style={{display:'flex',gap:5}}>
            <button onClick={copy} style={{...B({gap:4,fontSize:11,...F(copied?'#4ade80':'#94a3b8'),background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.12)',borderRadius:8,padding:'4px 8px',transition:'color .2s'})}}>
              <span style={{width:11,height:11}}>{I.copy}</span>{copied?t.copied:t.copyAnswer}
            </button>
            <button onClick={share} style={{...B({gap:4,fontSize:11,...F(shared?'#4ade80':'#94a3b8'),background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.12)',borderRadius:8,padding:'4px 8px',transition:'color .2s'})}}>
              <span style={{width:11,height:11}}>{I.share}</span>{shared?'✓':t.shareChat}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [splash,setSplash]=useState(true);
  const [lang,setLang]=useState(()=>S.get('hb_lang',null));
  const [screen,setScreen]=useState('home');
  const [chatId,setChatId]=useState(null);
  const [initialQ,setInitialQ]=useState(null);
  const [chats,setChats]=useState(()=>S.get('hb_chats',[]));
  const [lawCount,setLawCount]=useState(0);
  const [topQ,setTopQ]=useState(()=>S.get('hb_top_q',[]));
  const tg=window.Telegram?.WebApp;

  useEffect(()=>{
    if(tg){tg.ready();tg.expand();tg.setHeaderColor?.('#050810');tg.setBackgroundColor?.('#050810');}
    fetch(`${API}/api/stats`).then(r=>r.json()).then(d=>{
      if(d.total_laws)setLawCount(d.total_laws);
      if(d.top_questions){setTopQ(d.top_questions);S.set('hb_top_q',d.top_questions);}
    }).catch(()=>{});
  },[]);

  const setLangSave=l=>{S.set('hb_lang',l);setLang(l);};
  const startChat=q=>{const id=`chat_${Date.now()}`;setChatId(id);setInitialQ(q||null);setScreen('chat');};
  const openChat=id=>{setChatId(id);setInitialQ(null);setScreen('chat');};
  const saveChat=data=>{setChats(prev=>{const u=[data,...prev.filter(c=>c.id!==data.id)];S.set('hb_chats',u);return u;});};
  const deleteChat=id=>{S.del(`chat_${id}`);setChats(prev=>{const u=prev.filter(c=>c.id!==id);S.set('hb_chats',u);return u;});};

  if(splash)return <Splash onDone={()=>setSplash(false)}/>;
  if(!lang)return <LangSelect onSelect={setLangSave}/>;
  if(screen==='chat')return <Chat lang={lang} chatId={chatId} initialQ={initialQ} onBack={()=>{setScreen('home');setInitialQ(null);}} onSave={saveChat}/>;
  return <Home lang={lang} setLang={setLangSave} onChat={startChat} onOpenChat={openChat} chats={chats} onDeleteChat={deleteChat} lawCount={lawCount} topQ={topQ}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
