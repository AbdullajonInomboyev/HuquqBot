<!DOCTYPE html>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#050810"/>
  <title>Yuridik AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;background:#050810;color:#fff;font-family:'Inter',sans-serif}
    body{overflow:hidden}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:99px}
    .fi{animation:fi .4s ease both}
    .su{animation:su .28s ease both}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
    @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    textarea:focus,input:focus{outline:none}
    .spin{animation:spin .9s linear infinite}
    .flt{animation:flt 3s ease-in-out infinite}
    .cw,.hw{display:flex;flex-direction:column;height:100vh;height:100dvh}
    .hw{overflow:hidden}
    .hs{scrollbar-width:none}
    .hs::-webkit-scrollbar{display:none}
    textarea,input{color:#fff!important;font-family:'Inter',sans-serif!important}
    ::placeholder{color:#475569!important}
    button{font-family:'Inter',sans-serif}
    .btn-press{transition:opacity .15s,transform .1s}
    .btn-press:active{opacity:.7;transform:scale(.96)}
  </style>
</head>

// ── Storage ───────────────────────────────────────────────────────────────────
const S={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:(k)=>{try{localStorage.removeItem(k)}catch{}},

// ── Logo ──────────────────────────────────────────────────────────────────────
function Logo({size=60,style={}}){
  return(
    <>
      <img src="img/logo.png" alt="Yuridik AI"
        style={{width:size,height:size,objectFit:'contain',borderRadius:size*0.18,...style}}
        onError={e=>{e.target.style.display='none';if(e.target.nextElementSibling)e.target.nextElementSibling.style.display='flex';}}
      />
      <div style={{display:'none',width:size,height:size,borderRadius:size*0.18,background:'linear-gradient(135deg,#162035,#1e2d4a)',border:'1px solid rgba(212,168,58,.3)',alignItems:'center',justifyContent:'center',...style}}>
        <svg width={size*.55} height={size*.55} viewBox="0 0 52 52" fill="none">
          <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2" fill="rgba(212,168,58,.08)" strokeLinejoin="round"/>
          <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </>
  );
}

// ── Splash ────────────────────────────────────────────────────────────────────
function Splash({onDone}){
  useEffect(()=>{
    const id=setTimeout(onDone,2000);
    return()=>clearTimeout(id);
  },[]);
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#050810',position:'relative',overflow:'hidden'}} className="fi">
      <div style={{position:'absolute',top:'18%',left:'50%',transform:'translateX(-50%)',width:300,height:300,background:'radial-gradient(circle,rgba(212,168,58,.08) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div className="flt" style={{marginBottom:22}}>
        <Logo size={120}/>
      </div>
      <h1 style={{fontSize:30,fontWeight:700,color:'#fff',marginBottom:6,letterSpacing:'-.5px'}}>Yuridik AI</h1>
      <p style={{fontSize:13,...F('#64748b')}}>O'zbekiston qonunchiligi bo'yicha AI</p>
      <div style={{display:'flex',gap:8,marginTop:32}}>
        {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#d4a83a',animation:`pulse 1.2s ${i*.2}s infinite ease-in-out`}}/>)}
      </div>
      <p style={{position:'absolute',bottom:28,fontSize:11,...F('#334155')}}>lex.uz • 50,000+ qonun hujjati</p>
    </div>
  );
}

// ── LangSelect ────────────────────────────────────────────────────────────────
function LangSelect({onSelect}){
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#050810',padding:'0 24px'}} className="fi">
      <div style={{marginBottom:18}}><Logo size={72}/></div>
      <h1 style={{fontSize:26,fontWeight:700,color:'#fff',marginBottom:6}}>Yuridik AI</h1>
      <p style={{fontSize:13,...F('#64748b'),marginBottom:32}}>Tilni tanlang / Выберите язык</p>
      <div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',gap:10}}>
        {[{l:'uz',f:'🇺🇿',n:"O'zbek tili",s:'Davom etish uchun tanlang'},{l:'ru',f:'🇷🇺',n:'Русский язык',s:'Выберите для продолжения'}].map(({l,f,n,s})=>(
          <button key={l} onClick={()=>onSelect(l)} className="btn-press"
            style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,background:'#101829',border:'1px solid rgba(212,168,58,.22)',cursor:'pointer',width:'100%'}}>
            <span style={{fontSize:26}}>{f}</span>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:14,fontWeight:600,...F('#fff')}}>{n}</div>
              <div style={{fontSize:11,...F('#64748b')}}>{s}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Home ──────────────────────────────────────────────────────────────────────
function Home({lang,setLang,onChat,onOpenChat,chats,onDeleteChat,lawCount,topQ}){
  const t=T[lang];
  const [query,setQuery]=useState('');
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [showLang,setShowLang]=useState(false);
  const [showAll,setShowAll]=useState(false);
  const timer=useRef(null);
  const tg=window.Telegram?.WebApp;
  const openUrl=url=>{if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank');};

  // M-2: lang dependency qo'shildi
  useEffect(()=>{
    clearTimeout(timer.current);
    if(query.trim().length<2){setResults([]);setSearching(false);return;}
    setSearching(true);
    timer.current=setTimeout(async()=>{
      try{
        const r=await fetch(`${API}/api/search?q=${encodeURIComponent(query.trim())}&lang=${lang}`);
        if(r.ok){const d=await r.json();setResults(d.results||[]);}
      }catch{}
      setSearching(false);
    },350);
  },[query,lang]);

  const qTitles=topQ.length>=4?topQ.slice(0,6):t.quickTitles;
  const qQ2=topQ.length>=4?topQ.slice(0,6):t.quickQ2;
  const displayChats=showAll?chats:chats.slice(0,3);

  return(
    <div className="hw" style={{background:'#050810'}}>
      {/* Header */}
      <div style={{flexShrink:0,padding:'14px 14px 8px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Logo size={34}/>
            <span style={{fontSize:19,fontWeight:700,color:'#fff',letterSpacing:'-.3px'}}>{t.appName}</span>
          </div>
          <button onClick={()=>setShowLang(true)} className="btn-press"
            style={{...B({padding:'6px 11px',borderRadius:10,background:'#101829',border:'1px solid rgba(212,168,58,.22)',fontSize:12,fontWeight:600,...F('#e2e8f0')})}}>
            {lang==='uz'?'🇺🇿 UZ':'🇷🇺 RU'}
          </button>
        </div>
        {lawCount>0&&(
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',animation:'pulse 2s infinite'}}/>
            <span style={{fontSize:11,...F('#64748b')}}>{lawCount.toLocaleString()} {t.lawCount} • {t.source}</span>
          </div>
        )}
      </div>

      {/* Scroll */}
      <div className="hs" style={{flex:1,overflowY:'auto',padding:'0 14px',paddingBottom:'max(90px,calc(76px + env(safe-area-inset-bottom)))'}}>
        {/* Search */}
        <div style={{position:'relative',marginBottom:12}}>
          <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',width:16,height:16,color:'#475569',pointerEvents:'none'}}>{I.search}</span>
          <input value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&query.trim())onChat(query.trim());}}
            placeholder={t.search}
            style={{width:'100%',paddingLeft:40,paddingRight:16,paddingTop:13,paddingBottom:13,borderRadius:16,background:'#101829',border:'1px solid rgba(212,168,58,.2)',fontSize:14}}
          />
          {searching&&<div style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',width:15,height:15,border:'2px solid #d4a83a',borderTopColor:'transparent',borderRadius:'50%'}} className="spin"/>}
        </div>

        {/* Search results */}
        {query.trim().length>=2&&(
          <div style={{marginBottom:12}} className="su">
            {results.length===0&&!searching?(
              <div style={{textAlign:'center',padding:'28px 0'}}>
                <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                <p style={{fontSize:14,fontWeight:500,...F('#94a3b8'),marginBottom:4}}>{t.noResult}</p>
                <p style={{fontSize:12,...F('#475569'),marginBottom:16}}>{t.noResultSub}</p>
                {/* FIX: query bilan chatga yuboradi */}
                <button onClick={()=>onChat(query.trim())} className="btn-press"
                  style={{display:'inline-flex',alignItems:'center',gap:7,padding:'10px 20px',borderRadius:22,background:'linear-gradient(135deg,#d4a83a,#b8902a)',border:'none',cursor:'pointer'}}>
                  <span style={{width:16,height:16,color:'#fff'}}>{I.bot}</span>
                  <span style={{fontSize:13,fontWeight:600,color:'#fff'}}>{t.askAI}: "{query.trim().slice(0,30)}"</span>
                </button>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {results.map((r,i)=>(
                  <button key={i} onClick={()=>onChat(r.title)} className="btn-press su"
                    style={{textAlign:'left',padding:'11px 13px',borderRadius:13,background:'#101829',border:'1px solid rgba(212,168,58,.15)',cursor:'pointer',animationDelay:`${i*.04}s`,width:'100%'}}>
                    <div style={{fontSize:13,fontWeight:500,...F('#fff'),marginBottom:3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{r.title}</div>
                    <div style={{display:'flex',gap:7,alignItems:'center'}}>
                      <span style={{fontSize:10,padding:'1px 7px',borderRadius:10,background:'rgba(212,168,58,.1)',border:'1px solid rgba(212,168,58,.2)',...F('#d4a83a')}}>{r.type||'lex.uz'}</span>
                      {r.date&&<span style={{fontSize:10,...F('#475569')}}>{r.date.slice(0,4)}</span>}
                    </div>
                  </button>
                ))}
                {/* FIX: query bilan chatga yuboradi */}
                <button onClick={()=>onChat(query.trim())} className="btn-press"
                  style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'11px',borderRadius:13,background:'rgba(212,168,58,.07)',border:'1px solid rgba(212,168,58,.22)',cursor:'pointer'}}>
                  <span style={{width:15,height:15,color:'#d4a83a'}}>{I.bot}</span>
                  <span style={{fontSize:13,fontWeight:500,...F('#f0c060')}}>🤖 AI: "{query.trim().slice(0,40)}"</span>
                </button>
              </div>
            )}
          </div>
        )}

        {!query&&(
          <>
            {/* Quick questions */}
            <div style={{fontSize:10,...F('#94a3b8'),textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:9}}>{t.quickQ}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:18}}>
              {qTitles.map((title,i)=>(
                <button key={i} onClick={()=>onChat(qQ2[i])} className="btn-press su"
                  style={{padding:'8px 14px',borderRadius:22,background:'#101829',border:'1px solid rgba(212,168,58,.2)',cursor:'pointer',animationDelay:`${i*.04}s`}}>
                  <span style={{fontSize:12,fontWeight:500,...F('#e2e8f0')}}>{title}</span>
                </button>
              ))}
            </div>

            {/* Chat history */}
            {chats.length>0&&(
              <>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>

                          <div style={{fontSize:10,...F('#475569')}}>{new Date(c.updatedAt).toLocaleDateString()} · {c.messages?.length||0} xabar</div>

        <button onClick={()=>onChat(query.trim()||'')} className="btn-press"

          <div style={{width:'100%',background:'#0a0f1e',borderRadius:'22px 22px 0 0',padding:'20px 16px',border:'1px solid rgba(212,168,58,.18)'}} className="su" onClick={e=>e.stopPropagation()}>
            <p style={{fontSize:17,fontWeight:600,color:'#fff',marginBottom:14}}>{t.changeLang}</p>

                style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:13,background:lang===l?'rgba(212,168,58,.12)':'#101829',border:`1px solid rgba(212,168,58,${lang===l?.35:.15})`,cursor:'pointer',width:'100%',marginBottom:8}}>

    </div>
  );
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function Chat({lang,chatId,initialQ,onBack,onSave}){
  const t=T[lang];
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [steps,setSteps]=useState([]);
  const bottomRef=useRef();
  const inputRef=useRef();
  const fileRef=useRef();
  const tg=window.Telegram?.WebApp;
  const messagesRef=useRef(messages);
  messagesRef.current=messages;

  // M-1: stale closure fix — useCallback + ref
  const saveChat=useCallback((msgs,firstQ)=>{
    const title=firstQ?.slice(0,50)||msgs[0]?.content?.slice(0,50)||'Chat';
    const data={id:chatId,title,messages:msgs,updatedAt:Date.now()};
    S.set(`chat_${chatId}`,data);onSave(data);
  },[chatId,onSave]);

  const sendMsg=useCallback(async(text,isDoc=false)=>{
    if(!text?.trim()||busy)return;
    const q=text.trim();
    setInput('');
    if(inputRef.current)inputRef.current.style.height='auto';
    setBusy(true);
    const nm=[...messagesRef.current,{role:'user',content:q,ts:Date.now()}];
    setMessages(nm);
    setSteps([t.analyzing,t.searching,t.aiThinking].map((s,i)=>({text:s,state:i===0?'active':'pending'})));
    await sleep(400);
    setSteps(s=>s.map((x,i)=>i===0?{...x,state:'done'}:i===1?{...x,state:'active'}:x));
    try{
      const r=await fetch(`${API}/api/ask`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          question:q,lang,is_doc:isDoc,
          history:messagesRef.current.slice(-8).map(m=>({role:m.role,content:m.role==='user'?m.content:m.content?.simpleAnswer||''}))
        }),
      });
      const d=await r.json();
      setSteps(s=>s.map((x,i)=>i<=1?{...x,state:'done'}:{...x,state:'active'}));
      await sleep(300);setSteps([]);
      const ans={role:'assistant',content:d.answer,sources:d.sources,id:`msg_${Date.now()}`,ts:Date.now()};
      const all=[...nm,ans];
      setMessages(all);saveChat(all,q);
      if(tg?.HapticFeedback)tg.HapticFeedback.impactOccurred('light');
    }catch{
      setSteps([]);
      setMessages(m=>[...m,{role:'assistant',content:null,error:t.err,ts:Date.now()}]);
    }
    setBusy(false);
  },[busy,lang,t,saveChat,tg]);

  // M-1: fixed deps
  useEffect(()=>{
    const saved=S.get(`chat_${chatId}`,null);
    if(saved?.messages?.length>0){
      setMessages(saved.messages);
    } else if(initialQ){
      sendMsg(initialQ);
    }
  },[chatId]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages,steps]);

  const handleFile=async file=>{
    if(!file||busy)return;
    const fileName=file.name;
    const nm=[...messagesRef.current,{role:'user',content:null,fileMsg:true,fileName,ts:Date.now()}];
    setMessages(nm);setBusy(true);
    setSteps([{text:t.analyzingDoc,state:'active'}]);
    try{
      const fd=new FormData();fd.append('file',file);fd.append('lang',lang);
      const r=await fetch(`${API}/api/upload`,{method:'POST',body:fd});
      const d=await r.json();
      setSteps([]);
      if(d.answer){
        const ans={role:'assistant',content:d.answer,sources:d.sources||[],id:`msg_${Date.now()}`,ts:Date.now()};
        const all=[...nm,ans];
        setMessages(all);saveChat(all,fileName);
        if(d.follow_up_questions?.length>0){
          for(const fq of d.follow_up_questions){
            await sleep(600);
            setSteps([{text:t.analyzingDoc,state:'active'}]);
            try{
              const r2=await fetch(`${API}/api/ask`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:fq,lang,is_doc:true,history:[]})});
              const d2=await r2.json();
              setSteps([]);
              if(d2.answer){
                const a2={role:'assistant',content:d2.answer,sources:[],id:`msg_${Date.now()}`,ts:Date.now()};
                setMessages(m=>{const u=[...m,a2];saveChat(u,fileName);return u;});
              }
            }catch{setSteps([]);}
          }
        }
      }else{
        setMessages(m=>[...m,{role:'assistant',content:null,error:d.error||t.err,ts:Date.now()}]);
      }
    }catch{
      setSteps([]);
      setMessages(m=>[...m,{role:'assistant',content:null,error:t.err,ts:Date.now()}]);
    }
    setBusy(false);
  };

  const openUrl=url=>{if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank');};
  const sendFb=async(msgId,val)=>{
    try{await fetch(`${API}/api/feedback`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msgId,val,lang})});}catch{}
  };

  return(
    <div className="cw" style={{background:'#050810'}}>
      {/* Header */}
      <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderBottom:'1px solid rgba(212,168,58,.08)'}}>
        <button onClick={onBack} className="btn-press"
          style={{...B({width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.18)',color:'#94a3b8'})}}>
          <span style={{width:18,height:18}}>{I.back}</span>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,...F('#fff')}}>{t.chatTitle}</div>
          <div style={{fontSize:10,...F('#475569')}}>LEX.UZ · MY.GOV.UZ · AI</div>
        </div>
        <button onClick={()=>{S.del(`chat_${chatId}`);onBack();}} className="btn-press"
          style={{...B({width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.18)',color:'#475569'})}}>
          <span style={{width:14,height:14}}>{I.plus}</span>
        </button>
      </div>

      {/* Messages */}
      <div className="hs" style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
        {messages.length===0&&!busy&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>⚖️</div>
            <p style={{fontSize:14,fontWeight:500,...F('#64748b'),marginBottom:6}}>{t.placeholder}</p>
          </div>
        )}
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}} className="su">
            {m.role==='user'?(
              m.fileMsg?(
                <div style={{maxWidth:'75%',padding:'10px 13px',borderRadius:'16px 16px 4px 16px',background:'linear-gradient(135deg,#1e3a6e,#162d58)',border:'1px solid rgba(100,130,200,.2)',display:'flex',alignItems:'center',gap:9}}>
                  <div style={{width:32,height:32,borderRadius:9,background:'rgba(212,168,58,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{width:16,height:16,color:'#d4a83a'}}>{I.doc}</span>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:500,...F('#fff'),maxWidth:160,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{m.fileName}</div>
                    <div style={{fontSize:10,...F('#93c5fd')}}>{t.docUploaded}</div>
                  </div>
                </div>
              ):(
                <div style={{maxWidth:'80%',padding:'10px 14px',borderRadius:'17px 17px 4px 17px',background:'linear-gradient(135deg,#1e3a6e,#162d58)',border:'1px solid rgba(100,130,200,.18)',fontSize:14,...F('#fff'),lineHeight:1.55}}>
                  {m.content}
                </div>
              )
            ):m.error?(
              <div style={{maxWidth:'80%',padding:'10px 13px',borderRadius:'17px 17px 17px 4px',background:'#101829',border:'1px solid rgba(239,68,68,.2)',fontSize:13,...F('#f87171')}}>⚠️ {m.error}</div>
            ):(
              <AnsCard answer={m.content} sources={m.sources} t={t} openUrl={openUrl} msgId={m.id} onFb={sendFb}/>
            )}
          </div>
        ))}
        {steps.length>0&&(
          <div style={{display:'flex'}} className="su">
            <div style={{padding:'11px 13px',borderRadius:'17px 17px 17px 4px',background:'#101829',border:'1px solid rgba(212,168,58,.15)',minWidth:190}}>
              {steps.filter(s=>s.text).map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'3px 0'}}>
                  <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,background:s.state==='done'?'#22c55e':s.state==='active'?'#d4a83a':'#162035',animation:s.state==='active'?'pulse 1s infinite':undefined}}/>
                  <span style={{fontSize:12,...F(s.state==='done'?'#4ade80':s.state==='active'?'#e2e8f0':'#475569')}}>{s.text}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input — FIX: placeholder markazlashtirilgan */}
      <div style={{flexShrink:0,padding:'8px 12px',paddingBottom:'max(10px,calc(8px + env(safe-area-inset-bottom)))',borderTop:'1px solid rgba(212,168,58,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:20,background:'#101829',border:'1px solid rgba(212,168,58,.18)',minHeight:48}}>
          <button onClick={()=>fileRef.current?.click()} disabled={busy} className="btn-press"
            style={{...B({width:34,height:34,borderRadius:10,background:'rgba(212,168,58,.08)',color:'#d4a83a',flexShrink:0,opacity:busy?.5:1})}}>
            <span style={{width:16,height:16}}>{I.attach}</span>
          </button>
          <input ref={fileRef} type="file" accept=".pdf,.docx,.doc" style={{display:'none'}} onChange={e=>{handleFile(e.target.files[0]);e.target.value='';}}/>
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            placeholder={t.placeholder} rows={1}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(input);}}}
            onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,96)+'px';}}
            style={{flex:1,background:'transparent',border:'none',fontSize:14,...F('#fff'),lineHeight:1.5,resize:'none',maxHeight:96,minHeight:22,display:'block',padding:'2px 0'}}
          />
          <button onClick={()=>sendMsg(input)} disabled={busy||!input.trim()} className="btn-press"
            style={{...B({width:34,height:34,borderRadius:'50%',background:busy||!input.trim()?'rgba(212,168,58,.1)':'linear-gradient(135deg,#d4a83a,#b8902a)',flexShrink:0,transition:'background .2s'})}}>
            <span style={{width:14,height:14,...F('#fff')}}>{I.send}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── AnsCard ───────────────────────────────────────────────────────────────────
function AnsCard({answer,sources,t,openUrl,msgId,onFb}){
  const [fb,setFb]=useState(null);
  const [copied,setCopied]=useState(false);
  const [shared,setShared]=useState(false);
  if(!answer)return null;

  const cs=answer.confidence==='high'?{c:'#4ade80',b:'rgba(34,197,94,.1)',br:'rgba(34,197,94,.2)'}
    :answer.confidence==='medium'?{c:'#f0c060',b:'rgba(212,168,58,.1)',br:'rgba(212,168,58,.2)'}
    :{c:'#f87171',b:'rgba(239,68,68,.1)',br:'rgba(239,68,68,.2)'};
  const ct=answer.confidence==='high'?t.highConf:answer.confidence==='medium'?t.medConf:t.lowConf;

  const copy=()=>{
    const tx=`⚖️ ${answer.category}\n\n${answer.simpleAnswer||''}\n\n📌 ${answer.legalBasis||''}\n\n@yuridikAIbot`;
    navigator.clipboard?.writeText(tx).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };
  const share=()=>{
    const tx=`⚖️ Yuridik AI:\n\n${answer.simpleAnswer||''}\n\n📌 ${answer.legalBasis||''}\n\nlex.uz`;
    if(navigator.share)navigator.share({text:tx}).catch(()=>{});
    else navigator.clipboard?.writeText(tx).then(()=>{setShared(true);setTimeout(()=>setShared(false),2000);});
  };

  const safeHtml=(txt='')=>txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br/>');

  return(
    <div style={{maxWidth:'92%',width:'92%'}}>
      <div style={{padding:'13px',borderRadius:'17px 17px 17px 4px',background:'#101829',border:'1px solid rgba(212,168,58,.15)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:17}}>{answer.icon||'⚖️'}</span>
            <span style={{fontSize:11,fontWeight:700,...F('#d4a83a'),textTransform:'uppercase',letterSpacing:'0.05em'}}>{answer.category}</span>
          </div>
          <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,color:cs.c,background:cs.b,border:`1px solid ${cs.br}`,fontWeight:500}}>{ct}</span>
        </div>

        {/* Legal basis */}
        {answer.legalBasis&&(
          <div style={{display:'flex',gap:7,marginBottom:9,padding:'7px 9px',borderRadius:9,background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.1)'}}>
            <span style={{fontSize:11,...F('#d4a83a'),flexShrink:0}}>📌</span>
            <span style={{fontSize:12,...F('#e2e8f0'),lineHeight:1.45}}>{answer.legalBasis}</span>
          </div>
        )}

        {/* Answer */}
        <p style={{fontSize:14,...F('#e2e8f0'),lineHeight:1.65,marginBottom:(answer.steps||[]).length?9:0}}
          dangerouslySetInnerHTML={{__html:safeHtml(answer.simpleAnswer)}}/>

        {/* Steps */}
        {(answer.steps||[]).length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:9}}>
            {answer.steps.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9}}>
                <span style={{width:18,height:18,borderRadius:'50%',background:'rgba(212,168,58,.12)',fontSize:10,fontWeight:700,...F('#f0c060'),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>{i+1}</span>
                <span style={{fontSize:13,...F('#e2e8f0'),lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
        )}

        {/* Sources */}
        {(sources||[]).length>0&&(
          <div style={{borderTop:'1px solid rgba(212,168,58,.08)',paddingTop:9,marginTop:9}}>
            <div style={{fontSize:10,...F('#64748b'),textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:600,marginBottom:7}}>{t.officialSrc}</div>
            {sources.map((s,i)=>(
              <div key={i} style={{marginBottom:7}}>
                <button onClick={()=>openUrl(s.url)}
                  style={{...B({justifyContent:'flex-start',gap:5,fontSize:12,...F('#d4a83a'),marginBottom:5,width:'100%',textAlign:'left'})}}>
                  <span style={{width:11,height:11,flexShrink:0}}>{I.link}</span>
                  <span style={{overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{s.title}</span>
                </button>
                <button onClick={()=>openUrl(s.url)} className="btn-press"
                  style={{...B({gap:5,fontSize:11,...F('#94a3b8'),background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.12)',borderRadius:8,padding:'4px 9px'})}}>
                  <span style={{width:10,height:10}}>{I.globe}</span>{t.readFull} →
                </button>
              </div>
            ))}
          </div>
        )}

        {/* Warning */}
        {answer.warning&&answer.warning!=='null'&&(
          <div style={{display:'flex',gap:7,marginTop:9,paddingTop:9,borderTop:'1px solid rgba(212,168,58,.08)'}}>
            <span style={{width:12,height:12,...F('#f0c060'),flexShrink:0,marginTop:2}}>{I.info}</span>
            <span style={{fontSize:12,...F('#f0c060'),lineHeight:1.5}}>{answer.warning}</span>
          </div>
        )}

        {/* Actions */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,paddingTop:9,borderTop:'1px solid rgba(212,168,58,.07)'}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:10,...F('#475569')}}>{t.feedbackQ}</span>
            <button onClick={()=>{setFb('up');onFb?.(msgId,'up');}} className="btn-press"
              style={{...B({width:27,height:27,borderRadius:8,background:fb==='up'?'rgba(34,197,94,.15)':'rgba(212,168,58,.05)',border:`1px solid ${fb==='up'?'rgba(34,197,94,.3)':'rgba(212,168,58,.1)'}`,transition:'all .18s'})}}>
              <span style={{width:12,height:12,...F(fb==='up'?'#4ade80':'#64748b')}}>{I.tUp}</span>
            </button>
            <button onClick={()=>{setFb('down');onFb?.(msgId,'down');}} className="btn-press"
              style={{...B({width:27,height:27,borderRadius:8,background:fb==='down'?'rgba(239,68,68,.15)':'rgba(212,168,58,.05)',border:`1px solid ${fb==='down'?'rgba(239,68,68,.3)':'rgba(212,168,58,.1)'}`,transition:'all .18s'})}}>
              <span style={{width:12,height:12,...F(fb==='down'?'#f87171':'#64748b')}}>{I.tDn}</span>
            </button>
          </div>
          <div style={{display:'flex',gap:5}}>
            <button onClick={copy} className="btn-press"
              style={{...B({gap:4,fontSize:11,...F(copied?'#4ade80':'#94a3b8'),background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.12)',borderRadius:8,padding:'4px 8px'})}}>
              <span style={{width:11,height:11}}>{I.copy}</span>{copied?t.copied:t.copyAnswer}
            </button>
            <button onClick={share} className="btn-press"
              style={{...B({gap:4,fontSize:11,...F(shared?'#4ade80':'#94a3b8'),background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.12)',borderRadius:8,padding:'4px 8px'})}}>
              <span style={{width:11,height:11}}>{I.share}</span>{shared?'✓':t.shareChat}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [splash,setSplash]=useState(true);
  const [lang,setLang]=useState(()=>S.get('hb_lang',null));
  const [screen,setScreen]=useState('home');
  const [chatId,setChatId]=useState(null);
  const [initialQ,setInitialQ]=useState(null);
  const [chats,setChats]=useState(()=>S.get('hb_chats',[]));
  const [lawCount,setLawCount]=useState(0);
  const [topQ,setTopQ]=useState(()=>S.get(`hb_top_q_${S.get('hb_lang','uz')}`,[]));
  const tg=window.Telegram?.WebApp;

  useEffect(()=>{
    if(tg){
      tg.ready();
      tg.expand();
      tg.requestFullscreen?.(); // Full screen support
      tg.setHeaderColor?.('#050810');
      tg.setBackgroundColor?.('#050810');
    }
  },[]);

  useEffect(()=>{
    if(!lang)return;
    fetch(`${API}/api/stats?lang=${lang}`).then(r=>r.json()).then(d=>{
      if(d.total_laws)setLawCount(d.total_laws);
      if(d.top_questions?.length>0){
        const filtered=d.top_questions.filter(q=>{
          const qIsRu=/[а-яё]/i.test(q);
          return(lang==='ru')===qIsRu;
        });
        if(filtered.length>=4){setTopQ(filtered);S.set(`hb_top_q_${lang}`,filtered);}
      }
    }).catch(()=>{});
  },[lang]);

  const setLangSave=useCallback(l=>{S.set('hb_lang',l);setLang(l);setTopQ(S.get(`hb_top_q_${l}`,[]));},[]);
  const startChat=useCallback(q=>{const id=`chat_${Date.now()}`;setChatId(id);setInitialQ(q||null);setScreen('chat');},[]);
  const openChat=useCallback(id=>{setChatId(id);setInitialQ(null);setScreen('chat');},[]);
  const saveChat=useCallback(data=>{setChats(prev=>{const u=[data,...prev.filter(c=>c.id!==data.id)];S.set('hb_chats',u);return u;});},[]);
  const deleteChat=useCallback(id=>{S.del(`chat_${id}`);setChats(prev=>{const u=prev.filter(c=>c.id!==id);S.set('hb_chats',u);return u;});},[]);

  if(splash)return <Splash onDone={()=>setSplash(false)}/>;
  if(!lang)return <LangSelect onSelect={setLangSave}/>;
  if(screen==='chat')return <Chat lang={lang} chatId={chatId} initialQ={initialQ} onBack={()=>{setScreen('home');setInitialQ(null);}} onSave={saveChat}/>;
  return <Home lang={lang} setLang={setLangSave} onChat={startChat} onOpenChat={openChat} chats={chats} onDeleteChat={deleteChat} lawCount={lawCount} topQ={topQ}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
