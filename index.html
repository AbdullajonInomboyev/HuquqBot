<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0a0f1e"/>
  <title>HuquqBot — Yuridik Yordamchi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 950:'#050810', 900:'#0a0f1e', 800:'#101829', 700:'#162035', 600:'#1e2d4a' },
            gold: { 400:'#f0c060', 500:'#d4a83a', 600:'#b8902a' },
            jade: { 400:'#4ade80', 500:'#22c55e', 600:'#16a34a' },
            slate2: { 400:'#94a3b8', 500:'#64748b', 600:'#475569' }
          },
          fontFamily: {
            display: ['Crimson Pro', 'Georgia', 'serif'],
            body: ['DM Sans', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;background:#050810;color:#fff}
    body{overflow:hidden}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:99px}
    .fade-in{animation:fadeIn .5s ease both}
    .slide-up{animation:slideUp .35s ease both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes dotPulse{0%,80%,100%{opacity:.25;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
    textarea:focus,input:focus{outline:none}
    .gold-border{border:1px solid rgba(212,168,58,.2)}
    .gold-border-strong{border:1px solid rgba(212,168,58,.4)}
    .spin{animation:spin 1s linear infinite}
    .float{animation:float 3s ease-in-out infinite}
    /* Keyboard fix */
    .chat-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh}
    .home-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const API = '';

    highConf:'Высокая точность', medConf:'Средняя точность', lowConf:'Проверьте',
    officialSrc:'Официальные источники', uploadDoc:'Загрузить документ',
    dragDrop:'Перетащите файл или нажмите', supported:'PDF, DOCX, DOC',
    readFull:'Читать полный закон', feedbackQ:'Был ли ответ полезен?',
    shareChat:'Поделиться ответом', copied:'Скопировано!',
    quickTitles:['Трудовой отпуск','Открыть ИП','Налог на имущество','Трудовые права','Семейное право','Транспортный налог'],
    quickQ2:['Сколько дней длится трудовой отпуск?','Что нужно для открытия ИП?','Какой налог при покупке недвижимости?','Какие права при увольнении?','Как делится имущество при разводе?','Какой налог при покупке авто?'],
    quickIcons:['📋','🏢','🏠','⚖️','👨‍👩‍👧','🚗'],
  }
};

// ── Storage ───────────────────────────────────────────────────────────────────
const storage = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:(k)=>{try{localStorage.removeItem(k)}catch{}},
};

// ── Icons ─────────────────────────────────────────────────────────────────────
const Ic = {

  share:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
  thumb_up:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>,
  thumb_down:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg>,
};

// ── Splash ────────────────────────────────────────────────────────────────────
function SplashScreen({ onDone }) {
  useEffect(() => { setTimeout(onDone, 2200); }, []);
  return (
    <div className="h-screen flex flex-col items-center justify-center bg-navy-950 fade-in relative overflow-hidden">
      {/* Background glow effects */}
      <div style={{position:'absolute',top:'20%',left:'50%',transform:'translateX(-50%)',width:300,height:300,background:'radial-gradient(circle,rgba(212,168,58,.12) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'10%',right:'10%',width:200,height:200,background:'radial-gradient(circle,rgba(34,197,94,.07) 0%,transparent 70%)',pointerEvents:'none'}}/>

      {/* Logo */}
      <div className="float mb-6">
        <div style={{width:80,height:80,background:'linear-gradient(135deg,#162035,#1e2d4a)',borderRadius:24,border:'1px solid rgba(212,168,58,.3)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 20px 60px rgba(212,168,58,.15)'}}>
          <svg width="46" height="46" viewBox="0 0 52 52" fill="none">
            <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2" fill="rgba(212,168,58,.08)" strokeLinejoin="round"/>
            <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </div>

      <h1 className="font-display text-4xl text-white mb-2 fade-in" style={{animationDelay:'.2s'}}>HuquqBot</h1>
      <p className="text-slate2-400 text-sm font-body fade-in" style={{animationDelay:'.3s'}}>Yuridik AI yordamchi</p>

      {/* Animated dots */}
      <div className="flex gap-2 mt-10 fade-in" style={{animationDelay:'.5s'}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#d4a83a',animation:`dotPulse 1.2s ${i*0.2}s infinite ease-in-out`}}/>
        ))}
      </div>

      {/* Bottom text */}
      <div className="absolute bottom-8 text-xs text-slate2-600 font-body fade-in" style={{animationDelay:'.6s'}}>
        lex.uz • 50,000+ qonun hujjati
      </div>
    </div>
  );
}

// ── Language Screen ───────────────────────────────────────────────────────────
function LangScreen({ onSelect }) {
  return (
    <div className="h-screen flex flex-col items-center justify-center bg-navy-950 fade-in px-6">
      <div style={{width:64,height:64,background:'linear-gradient(135deg,#162035,#1e2d4a)',borderRadius:20,border:'1px solid rgba(212,168,58,.3)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
        <svg width="36" height="36" viewBox="0 0 52 52" fill="none">
          <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2" fill="rgba(212,168,58,.08)" strokeLinejoin="round"/>
          <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <h1 className="font-display text-3xl text-white mb-1">HuquqBot</h1>
      <p className="text-slate2-400 text-sm mb-10 font-body">Tilni tanlang / Выберите язык</p>
      <div className="w-full max-w-xs space-y-3">
        {[{l:'uz',flag:'🇺🇿',name:"O'zbek tili",sub:'Davom etish uchun tanlang'},{l:'ru',flag:'🇷🇺',name:'Русский язык',sub:'Выберите для продолжения'}].map(({l,flag,name,sub})=>(
          <button key={l} onClick={()=>onSelect(l)}
            className="w-full flex items-center gap-4 p-4 rounded-2xl bg-navy-800 gold-border hover:bg-navy-700 transition-all active:scale-95">
            <span style={{fontSize:28}}>{flag}</span>
            <div className="text-left">
              <div className="font-body font-semibold text-white text-sm">{name}</div>
              <div className="text-xs text-slate2-400 font-body">{sub}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Home Screen ───────────────────────────────────────────────────────────────
function HomeScreen({ lang, onChat, onOpenChat, chats, onDeleteChat, lawCount }) {
  const t = T[lang];
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [showUpload, setShowUpload] = useState(false);
  const timer = useRef(null);
  const tg = window.Telegram?.WebApp;

  useEffect(()=>{
    clearTimeout(timer.current);
    if(query.trim().length<2){setResults([]);return;}
    setSearching(true);
    timer.current=setTimeout(async()=>{
      try{
        const r=await fetch(`${API}/api/search?q=${encodeURIComponent(query)}&lang=${lang}`);
        if(r.ok){const d=await r.json();setResults(d.results||[]);}
      }catch{}
      setSearching(false);
    },400);
  },[query]);

  const openUrl=url=>{if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank');};

  return (
    <div className="home-wrap bg-navy-950">
      {/* Header */}
      <div className="flex-shrink-0 px-4 pt-5 pb-3" style={{background:'linear-gradient(180deg,#050810 60%,rgba(5,8,16,0) 100%)'}}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div style={{width:32,height:32,background:'linear-gradient(135deg,#162035,#1e2d4a)',borderRadius:10,border:'1px solid rgba(212,168,58,.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="18" height="18" viewBox="0 0 52 52" fill="none">
                <path d="M26 8L11 16v13c0 10 6.5 17.5 15 19.5C35.5 46.5 41 39 41 29V16L26 8z" stroke="#d4a83a" strokeWidth="2.5" fill="rgba(212,168,58,.1)" strokeLinejoin="round"/>
                <path d="M19 26l5 5 9-9" stroke="#d4a83a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <span className="font-display text-xl text-white">{t.appName}</span>
          </div>
          <button onClick={()=>setShowUpload(true)}
            style={{width:34,height:34,borderRadius:10,background:'#101829',border:'1px solid rgba(212,168,58,.2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#d4a83a'}}>
            <span style={{width:16,height:16,display:'block'}}>{Ic.upload}</span>
          </button>
        </div>
        {lawCount>0&&(
          <div className="flex items-center gap-1.5 mt-1.5">
            <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',animation:'dotPulse 2s infinite'}}/>
            <span style={{fontSize:11,color:'#64748b',fontFamily:'DM Sans,sans-serif'}}>
              {lawCount.toLocaleString()} {t.lawCount} • {t.source}
            </span>
          </div>
        )}
      </div>

      {/* Scrollable content */}
      <div className="flex-1 overflow-y-auto px-4 pb-24" style={{scrollbarWidth:'none'}}>
        {/* Search */}
        <div className="relative mb-4">
          <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',width:17,height:17,color:'#475569'}}>{Ic.search}</div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={t.search}
            style={{width:'100%',paddingLeft:42,paddingRight:16,paddingTop:13,paddingBottom:13,borderRadius:16,background:'#101829',border:'1px solid rgba(212,168,58,.2)',color:'#fff',fontSize:14,fontFamily:'DM Sans,sans-serif'}}
            className="placeholder-slate2-600 focus:border-gold-500 transition-colors"
          />
          {searching&&<div style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',width:16,height:16,border:'2px solid #d4a83a',borderTopColor:'transparent',borderRadius:'50%'}} className="spin"/>}
        </div>

        {/* Search results */}
        {query.trim().length>=2&&(
          <div className="mb-4 slide-up">
            {results.length===0&&!searching?(
              <div style={{textAlign:'center',padding:'28px 0',color:'#64748b',fontSize:13}}>{t.noResult}</div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {results.map((r,i)=>(
                  <button key={i} onClick={()=>onChat(r.title)}
                    style={{width:'100%',textAlign:'left',padding:'12px 14px',borderRadius:14,background:'#101829',border:'1px solid rgba(212,168,58,.2)',animationDelay:`${i*.05}s`}}
                    className="slide-up hover:bg-navy-700 transition-colors active:scale-98">
                    <div style={{fontSize:13,color:'#fff',fontFamily:'DM Sans,sans-serif',fontWeight:500,marginBottom:4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{r.title}</div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:11,color:'#d4a83a'}}>{r.number||'lex.uz'}</span>
                      {r.date&&<span style={{fontSize:11,color:'#475569'}}>• {r.date.slice(0,4)}</span>}
                      <span style={{marginLeft:'auto',width:12,height:12,color:'#475569'}}>{Ic.link}</span>
                    </div>
                  </button>
                ))}
                {results.length>0&&(
                  <button onClick={()=>onChat(query)}
                    style={{width:'100%',padding:'12px',borderRadius:14,background:'rgba(212,168,58,.08)',border:'1px solid rgba(212,168,58,.25)',color:'#f0c060',fontSize:13,fontFamily:'DM Sans,sans-serif',fontWeight:500}}>
                    🤖 AI dan so'rash: "{query}"
                  </button>
                )}
              </div>
            )}
          </div>
        )}

        {/* Quick Q */}
        {!query&&(
          <>
            <div style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:10,fontFamily:'DM Sans,sans-serif'}}>{t.quickQ}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
              {t.quickTitles.map((title,i)=>(
                <button key={i} onClick={()=>onChat(t.quickQ2[i])}
                  style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:8,padding:'14px 12px',borderRadius:16,background:'#101829',border:'1px solid rgba(212,168,58,.2)',animationDelay:`${i*.06}s`,cursor:'pointer'}}
                  className="slide-up hover:bg-navy-700 transition-colors active:scale-95">
                  <span style={{fontSize:22}}>{t.quickIcons[i]}</span>
                  <span style={{fontSize:12,color:'#fff',fontFamily:'DM Sans,sans-serif',fontWeight:500,lineHeight:1.3,textAlign:'left'}}>{title}</span>
                </button>
              ))}
            </div>

            {/* Sources */}
            <div style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:10,fontFamily:'DM Sans,sans-serif'}}>{t.sources}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
              {['lex.uz','my.gov.uz','soliq.uz','mehnat.uz'].map(s=>(
                <button key={s} onClick={()=>openUrl(`https://${s}`)}
                  style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:20,background:'#101829',border:'1px solid rgba(212,168,58,.2)',fontSize:12,color:'#e2e8f0',fontFamily:'DM Sans,sans-serif'}}>
                  <span style={{width:12,height:12}}>{Ic.globe}</span>{s}
                </button>
              ))}
            </div>

            {/* Chat history */}
            {chats.length>0&&(
              <>
                <div style={{fontSize:11,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:10,fontFamily:'DM Sans,sans-serif'}}>{t.history}</div>
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
                  {chats.slice(0,5).map(c=>(
                    <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px',borderRadius:14,background:'#101829',border:'1px solid rgba(212,168,58,.2)'}}>
                      <div style={{width:34,height:34,borderRadius:10,background:'#162035',display:'flex',alignItems:'center',justifyContent:'center',color:'#d4a83a',flexShrink:0}}>
                        <span style={{width:16,height:16,display:'block'}}>{Ic.chat}</span>
                      </div>
                      <button onClick={()=>onOpenChat(c.id)} style={{flex:1,textAlign:'left',minWidth:0}}>
                        <div style={{fontSize:12,color:'#fff',fontFamily:'DM Sans,sans-serif',fontWeight:500,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{c.title}</div>
                        <div style={{fontSize:11,color:'#475569',fontFamily:'DM Sans,sans-serif'}}>{new Date(c.updatedAt).toLocaleDateString()}</div>
                      </button>
                      <button onClick={()=>onDeleteChat(c.id)} style={{width:24,height:24,color:'#475569',flexShrink:0}}>
                        <span style={{width:16,height:16,display:'block'}}>{Ic.trash}</span>
                      </button>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* Disclaimer */}
            <div style={{display:'flex',gap:10,padding:'14px',borderRadius:16,background:'rgba(212,168,58,.05)',border:'1px solid rgba(212,168,58,.15)',marginBottom:8}}>
              <span style={{width:16,height:16,color:'#f0c060',flexShrink:0,marginTop:1}}>{Ic.info}</span>
              <p style={{fontSize:11,color:'#f0c060',fontFamily:'DM Sans,sans-serif',lineHeight:1.6}}>{t.disclaimer}</p>
            </div>
          </>
        )}
      </div>

      {/* Floating chat button */}
      <button onClick={()=>onChat('')}
        style={{position:'fixed',bottom:24,right:20,width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,#d4a83a,#b8902a)',boxShadow:'0 6px 28px rgba(212,168,58,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:40,border:'none',cursor:'pointer'}}
        className="active:scale-90 transition-transform">
        <span style={{width:24,height:24,color:'#fff',display:'block'}}>{Ic.chat}</span>
      </button>

      {showUpload&&<UploadModal lang={lang} onClose={()=>setShowUpload(false)} onResult={q=>{setShowUpload(false);onChat(q);}}/>}
    </div>
  );
}

// ── Upload Modal ──────────────────────────────────────────────────────────────
function UploadModal({ lang, onClose, onResult }) {
  const t = T[lang];
  const [uploading,setUploading]=useState(false);
  const [status,setStatus]=useState('');
  const fileRef=useRef();

  const handleFile=async file=>{
    if(!file)return;
    setUploading(true);
    setStatus(lang==='uz'?'Fayl yuklanmoqda...':'Загрузка файла...');
    const fd=new FormData();
    fd.append('file',file);fd.append('lang',lang);
    try{
      const r=await fetch(`${API}/api/upload`,{method:'POST',body:fd});
      const d=await r.json();
      if(d.summary){onResult(d.summary);}
      else{setStatus(t.errorMsg);setUploading(false);}
    }catch{setStatus(t.errorMsg);setUploading(false);}
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:50,display:'flex',alignItems:'flex-end',background:'rgba(5,8,16,.88)',backdropFilter:'blur(8px)'}}>
      <div style={{width:'100%',background:'#0a0f1e',borderRadius:'24px 24px 0 0',padding:'24px',border:'1px solid rgba(212,168,58,.2)'}} className="slide-up">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h3 style={{fontFamily:'Crimson Pro,serif',fontSize:20,color:'#fff'}}>{t.uploadDoc}</h3>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:'50%',background:'#101829',color:'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,border:'none',cursor:'pointer'}}>×</button>
        </div>
        {uploading?(
          <div style={{textAlign:'center',padding:'32px 0'}}>
            <div style={{width:40,height:40,border:'2px solid #d4a83a',borderTopColor:'transparent',borderRadius:'50%',margin:'0 auto 16px'}} className="spin"/>
            <p style={{color:'#94a3b8',fontSize:13,fontFamily:'DM Sans,sans-serif'}}>{status}</p>
          </div>
        ):(
          <div onClick={()=>fileRef.current?.click()}
            style={{border:'2px dashed rgba(212,168,58,.25)',borderRadius:16,padding:'32px',textAlign:'center',cursor:'pointer'}}
            onDragOver={e=>e.preventDefault()}
            onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}>
            <div style={{width:40,height:40,color:'#d4a83a',margin:'0 auto 12px'}}>{Ic.upload}</div>
            <p style={{color:'#fff',fontSize:13,fontFamily:'DM Sans,sans-serif',marginBottom:6}}>{t.dragDrop}</p>
            <p style={{color:'#475569',fontSize:12,fontFamily:'DM Sans,sans-serif'}}>{t.supported}</p>
            <input ref={fileRef} type="file" accept=".pdf,.docx,.doc" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Chat Screen ───────────────────────────────────────────────────────────────
function ChatScreen({ lang, chatId, initialQ, onBack, onSave }) {
  const t = T[lang];
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [steps,setSteps]=useState([]);
  const bottomRef=useRef();
  const inputRef=useRef();
  const tg=window.Telegram?.WebApp;

  useEffect(()=>{
    const saved=storage.get(`chat_${chatId}`,null);
    if(saved?.messages){setMessages(saved.messages);}
    else if(initialQ){sendMsg(initialQ);}
  },[chatId]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,steps]);

  const saveChat=(msgs,firstQ)=>{
    const title=firstQ?.slice(0,50)||msgs[0]?.content?.slice(0,50)||'Chat';
    const data={id:chatId,title,messages:msgs,updatedAt:Date.now()};
    storage.set(`chat_${chatId}`,data);
    onSave(data);
  };

  const sendMsg=async text=>{
    if(!text?.trim()||busy)return;
    const q=text.trim();
    setInput('');
    if(inputRef.current){inputRef.current.style.height='auto';}
    setBusy(true);
    const newMsgs=[...messages,{role:'user',content:q,ts:Date.now()}];
    setMessages(newMsgs);
    const stepList=[t.analyzing,t.searching,t.aiThinking];
    setSteps(stepList.map((s,i)=>({text:s,state:i===0?'active':'pending'})));
    await sleep(500);
    setSteps(s=>s.map((x,i)=>i===0?{...x,state:'done'}:i===1?{...x,state:'active'}:x));
    try{
      const r=await fetch(`${API}/api/ask`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:q,lang,history:messages.slice(-6)})
      });
      const d=await r.json();
      setSteps(s=>s.map((x,i)=>i<=1?{...x,state:'done'}:{...x,state:'active'}));
      await sleep(400);setSteps([]);
      const answer={role:'assistant',content:d.answer,sources:d.sources,ts:Date.now()};
      const all=[...newMsgs,answer];
      setMessages(all);saveChat(all,q);
      if(tg?.HapticFeedback)tg.HapticFeedback.impactOccurred('light');
    }catch{
      setSteps([]);
      setMessages(m=>[...m,{role:'assistant',content:null,error:t.errorMsg,ts:Date.now()}]);
    }
    setBusy(false);
  };

  const openUrl=url=>{if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank');};

  return (
    <div className="chat-wrap bg-navy-950">
      {/* Header */}
      <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid rgba(212,168,58,.15)'}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#94a3b8',cursor:'pointer'}}>
          <span style={{width:20,height:20,display:'block'}}>{Ic.back}</span>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:500,color:'#fff',fontFamily:'DM Sans,sans-serif'}}>{t.chatTitle}</div>
          <div style={{fontSize:11,color:'#475569',fontFamily:'DM Sans,sans-serif'}}>LEX.UZ · MY.GOV.UZ</div>
        </div>
        <button onClick={()=>{storage.del(`chat_${chatId}`);onBack();}}
          style={{width:36,height:36,borderRadius:12,background:'#101829',border:'1px solid rgba(212,168,58,.2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#475569',cursor:'pointer'}}>
          <span style={{width:16,height:16,display:'block'}}>{Ic.plus}</span>
        </button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:12,scrollbarWidth:'none'}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}} className="slide-up">
            {m.role==='user'?(
              <div style={{maxWidth:'82%',padding:'12px 14px',borderRadius:'18px 18px 4px 18px',background:'linear-gradient(135deg,#1e3a6e,#162d58)',border:'1px solid rgba(100,130,200,.2)',fontSize:14,color:'#fff',fontFamily:'DM Sans,sans-serif',lineHeight:1.55}}>
                {m.content}
                <div style={{textAlign:'right',fontSize:10,color:'rgba(148,163,184,.5)',marginTop:4}}>
                  {new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                </div>
              </div>
            ):m.error?(
              <div style={{maxWidth:'82%',padding:'12px 14px',borderRadius:'18px 18px 18px 4px',background:'#101829',border:'1px solid rgba(239,68,68,.2)',fontSize:13,color:'#f87171',fontFamily:'DM Sans,sans-serif'}}>
                ⚠️ {m.error}
              </div>
            ):(
              <AnswerBubble answer={m.content} sources={m.sources} lang={lang} openUrl={openUrl} ts={m.ts} t={t}/>
            )}
          </div>
        ))}

        {/* Steps */}
        {steps.length>0&&(
          <div style={{display:'flex',justifyContent:'flex-start'}} className="slide-up">
            <div style={{padding:'12px 14px',borderRadius:'18px 18px 18px 4px',background:'#101829',border:'1px solid rgba(212,168,58,.2)',minWidth:200}}>
              {steps.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,transition:'background .3s',background:s.state==='done'?'#22c55e':s.state==='active'?'#d4a83a':'#162035',animation:s.state==='active'?'dotPulse 1s infinite':undefined}}/>
                  <span style={{fontSize:12,fontFamily:'DM Sans,sans-serif',color:s.state==='done'?'#4ade80':s.state==='active'?'#fff':'#475569'}}>{s.text}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{flexShrink:0,padding:'10px 14px',borderTop:'1px solid rgba(212,168,58,.15)'}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:10,padding:'10px 12px',borderRadius:20,background:'#101829',border:'1px solid rgba(212,168,58,.2)'}}>
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            placeholder={t.placeholder} rows={1}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(input);}}}
            onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,100)+'px';}}
            style={{flex:1,background:'transparent',border:'none',color:'#fff',fontFamily:'DM Sans,sans-serif',fontSize:14,lineHeight:1.5,resize:'none',maxHeight:100,minHeight:22}}
          />
          <button onClick={()=>sendMsg(input)} disabled={busy||!input.trim()}
            style={{width:36,height:36,borderRadius:'50%',border:'none',cursor:busy||!input.trim()?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',background:busy||!input.trim()?'#162035':'linear-gradient(135deg,#d4a83a,#b8902a)',opacity:busy||!input.trim()?0.5:1}}>
            <span style={{width:16,height:16,color:'#fff',display:'block'}}>{Ic.send}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Answer Bubble ─────────────────────────────────────────────────────────────
function AnswerBubble({ answer, sources, lang, openUrl, ts, t }) {
  const [feedback,setFeedback]=useState(null);
  const [copied,setCopied]=useState(false);
  if(!answer)return null;

  const conf=answer.confidence;
  const confStyle=conf==='high'?{color:'#4ade80',background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.2)'}:conf==='medium'?{color:'#f0c060',background:'rgba(212,168,58,.1)',border:'1px solid rgba(212,168,58,.2)'}:{color:'#f87171',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)'};
  const confText=conf==='high'?t.highConf:conf==='medium'?t.medConf:t.lowConf;

  const handleShare=()=>{
    const text=`⚖️ HuquqBot javob:\n\n${answer.simpleAnswer}\n\n📌 ${answer.legalBasis||''}\n\nlex.uz da tekshiring`;
    if(navigator.share){navigator.share({text});}
    else{navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}
  };

  return (
    <div style={{maxWidth:'88%',width:'88%'}}>
      <div style={{padding:'14px',borderRadius:'18px 18px 18px 4px',background:'#101829',border:'1px solid rgba(212,168,58,.2)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:18}}>{answer.icon||'⚖️'}</span>
            <span style={{fontSize:11,fontWeight:600,color:'#d4a83a',letterSpacing:'0.05em',textTransform:'uppercase',fontFamily:'DM Sans,sans-serif'}}>{answer.category}</span>
          </div>
          <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,fontFamily:'DM Sans,sans-serif',...confStyle}}>{confText}</span>
        </div>

        {/* Legal basis */}
        {answer.legalBasis&&(
          <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:10,padding:'8px 10px',borderRadius:10,background:'rgba(212,168,58,.06)',border:'1px solid rgba(212,168,58,.12)'}}>
            <span style={{fontSize:12,color:'#d4a83a',flexShrink:0}}>📌</span>
            <span style={{fontSize:12,color:'#e2e8f0',fontFamily:'DM Sans,sans-serif',lineHeight:1.4}}>{answer.legalBasis}</span>
          </div>
        )}

        {/* Answer text */}
        <p style={{fontSize:14,color:'#e2e8f0',fontFamily:'DM Sans,sans-serif',lineHeight:1.65,marginBottom:10}} dangerouslySetInnerHTML={{__html:(answer.simpleAnswer||'').replace(/\n/g,'<br/>')}}/>

        {/* Steps */}
        {(answer.steps||[]).length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:10}}>
            {answer.steps.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,fontSize:13}}>
                <span style={{width:20,height:20,borderRadius:'50%',background:'rgba(212,168,58,.15)',color:'#f0c060',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,fontFamily:'DM Sans,sans-serif',fontWeight:600}}>{i+1}</span>
                <span style={{color:'#e2e8f0',fontFamily:'DM Sans,sans-serif',lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
        )}

        {/* Sources + Read full */}
        {(sources||[]).length>0&&(
          <div style={{borderTop:'1px solid rgba(212,168,58,.12)',paddingTop:10,marginTop:10}}>
            <div style={{fontSize:11,color:'#64748b',fontFamily:'DM Sans,sans-serif',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>{t.officialSrc}</div>
            {sources.map((s,i)=>(
              <div key={i} style={{marginBottom:6}}>
                <button onClick={()=>openUrl(s.url)}
                  style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#d4a83a',fontFamily:'DM Sans,sans-serif',background:'none',border:'none',cursor:'pointer',padding:0,marginBottom:4,width:'100%',textAlign:'left'}}>
                  <span style={{width:13,height:13,flexShrink:0}}>{Ic.link}</span>
                  <span style={{overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{s.title}</span>
                </button>
                <button onClick={()=>openUrl(s.url)}
                  style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#94a3b8',fontFamily:'DM Sans,sans-serif',background:'rgba(212,168,58,.06)',border:'1px solid rgba(212,168,58,.15)',borderRadius:8,padding:'4px 10px',cursor:'pointer'}}>
                  <span style={{width:11,height:11}}>{Ic.globe}</span>
                  {t.readFull}
                </button>
              </div>
            ))}
          </div>
        )}

        {/* Warning */}
        {answer.warning&&answer.warning!=='null'&&(
          <div style={{display:'flex',gap:8,marginTop:10,paddingTop:10,borderTop:'1px solid rgba(212,168,58,.12)'}}>
            <span style={{width:13,height:13,color:'#f0c060',flexShrink:0,marginTop:2}}>{Ic.info}</span>
            <span style={{fontSize:12,color:'#f0c060',fontFamily:'DM Sans,sans-serif',lineHeight:1.5}}>{answer.warning}</span>
          </div>
        )}

        {/* Feedback + Share */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,paddingTop:10,borderTop:'1px solid rgba(212,168,58,.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,color:'#475569',fontFamily:'DM Sans,sans-serif'}}>{t.feedbackQ}</span>
            <button onClick={()=>setFeedback('up')}
              style={{width:28,height:28,borderRadius:8,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',background:feedback==='up'?'rgba(34,197,94,.15)':'rgba(212,168,58,.06)',transition:'all .2s'}}>
              <span style={{width:13,height:13,color:feedback==='up'?'#4ade80':'#64748b'}}>{Ic.thumb_up}</span>
            </button>
            <button onClick={()=>setFeedback('down')}
              style={{width:28,height:28,borderRadius:8,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',background:feedback==='down'?'rgba(239,68,68,.15)':'rgba(212,168,58,.06)',transition:'all .2s'}}>
              <span style={{width:13,height:13,color:feedback==='down'?'#f87171':'#64748b'}}>{Ic.thumb_down}</span>
            </button>
          </div>
          <button onClick={handleShare}
            style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:copied?'#4ade80':'#94a3b8',fontFamily:'DM Sans,sans-serif',background:'rgba(212,168,58,.06)',border:'1px solid rgba(212,168,58,.15)',borderRadius:8,padding:'5px 10px',cursor:'pointer',transition:'color .2s'}}>
            <span style={{width:11,height:11}}>{Ic.share}</span>
            {copied?t.copied:t.shareChat}
          </button>
        </div>

        <div style={{textAlign:'right',fontSize:10,color:'rgba(100,116,139,.5)',marginTop:6,fontFamily:'DM Sans,sans-serif'}}>
          {new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · AI Generatsiyasi
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [splash,setSplash]=useState(true);
  const [lang,setLang]=useState(()=>storage.get('hb_lang',null));
  const [screen,setScreen]=useState('home');
  const [chatId,setChatId]=useState(null);
  const [initialQ,setInitialQ]=useState(null);
  const [chats,setChats]=useState(()=>storage.get('hb_chats',[]));
  const [lawCount,setLawCount]=useState(0);
  const tg=window.Telegram?.WebApp;

  useEffect(()=>{
    if(tg){tg.ready();tg.expand();tg.setHeaderColor?.('#050810');tg.setBackgroundColor?.('#050810');}
    fetch(`${API}/api/stats`).then(r=>r.json()).then(d=>{if(d.total_laws)setLawCount(d.total_laws);}).catch(()=>{});
  },[]);

  const selectLang=l=>{storage.set('hb_lang',l);setLang(l);};
  const startChat=q=>{const id=`chat_${Date.now()}`;setChatId(id);setInitialQ(q||null);setScreen('chat');};
  const openChat=id=>{setChatId(id);setInitialQ(null);setScreen('chat');};
  const saveChat=data=>{setChats(prev=>{const f=prev.filter(c=>c.id!==data.id);const u=[data,...f];storage.set('hb_chats',u);return u;});};
  const deleteChat=id=>{storage.del(`chat_${id}`);setChats(prev=>{const u=prev.filter(c=>c.id!==id);storage.set('hb_chats',u);return u;});};

  if(splash)return <SplashScreen onDone={()=>setSplash(false)}/>;
  if(!lang)return <LangScreen onSelect={selectLang}/>;
  if(screen==='chat')return <ChatScreen lang={lang} chatId={chatId} initialQ={initialQ} onBack={()=>{setScreen('home');setInitialQ(null);}} onSave={saveChat}/>;
  return <HomeScreen lang={lang} onChat={startChat} onOpenChat={openChat} chats={chats} onDeleteChat={deleteChat} lawCount={lawCount}/>;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
